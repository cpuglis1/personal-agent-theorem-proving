server {
    listen 4102;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every route is served by index.html (React Router handles it).
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
