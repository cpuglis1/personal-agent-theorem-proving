# ============================================================================
# SearXNG settings for Hyperion
# ----------------------------------------------------------------------------
# Purpose:
#   Configuration for the SearXNG metasearch engine instance that backs
#   Hyperion's `web_search` tool. SearXNG aggregates results from many search
#   engines behind a single privacy-respecting, OpenAI-agnostic HTTP API,
#   giving agents web access without binding to a single commercial provider.
#
# Role in the system:
#   - Runs as a service in the ~/ai/ai-router Docker Compose stack.
#   - Hyperion agents query it (typically via the JSON format) for live web
#     results during research/critique workflows; results may then be reranked
#     by Infinity and/or embedded into Qdrant.
#
# Key design decisions / non-obvious context:
#   - `use_default_settings: true` (below) means this file only OVERRIDES the
#     stock SearXNG defaults rather than redefining the entire config. Anything
#     not listed here inherits SearXNG's built-in defaults.
#   - The secret key is intentionally left blank and injected at runtime from
#     the SEARXNG_SECRET_KEY env var (see Docker Compose) so it never lands in
#     version control.
#   - JSON output is explicitly enabled because it is OFF by default in stock
#     SearXNG; agents depend on the `json` format for machine parsing.
#
# Docs: https://docs.searxng.org/admin/settings/settings.html
# ============================================================================

# Merge this file on top of SearXNG's shipped defaults instead of replacing
# them wholesale. Only the keys present below take effect as overrides.
use_default_settings: true

general:
  instance_name: "Hyperion Search"   # Display name shown in the web UI
  debug: false                        # Keep verbose debug logging off in normal operation

server:
  # Secret key is injected via SEARXNG_SECRET_KEY env var at runtime
  # (left empty here so the real secret stays out of git).
  secret_key: ""
  # Bind to all interfaces so the container is reachable from other services
  # on the Docker network / host. Port 8080 is the in-container listen port.
  bind_address: "0.0.0.0:8080"
  # Public base URL used for generating links; maps to the host-published port.
  base_url: "http://localhost:8888/"
  # Disable the built-in rate limiter: traffic is internal (agents only),
  # so request throttling would just get in the way.
  limiter: false

search:
  safe_search: 0          # 0 = no filtering (agents need unfiltered results)
  autocomplete: ""        # Disable search-as-you-type suggestions (no UI users)
  default_lang: "en"      # Default query language
  formats:
    - html                # Human-browsable UI
    - json                # Machine-readable API output consumed by Hyperion agents
                          # (NOTE: json is not enabled in stock SearXNG defaults)

engines:
  # Keep defaults; individual engines can be toggled here if needed
