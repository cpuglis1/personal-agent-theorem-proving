# =============================================================================
# LiteLLM Proxy Configuration
# Docs: https://docs.litellm.ai/docs/proxy/configs
#
# WHAT THIS IS
#   The single config that drives the LiteLLM proxy container in the ai-router
#   Docker Compose stack. The proxy exposes an OpenAI-compatible API at
#   http://localhost:4000/v1 and is the ONLY path through which the rest of the
#   ecosystem (Hyperion agents, the second-brain ingestion pipeline, Open WebUI,
#   slash-command skills) is allowed to reach an LLM. No component calls a
#   provider API (OpenAI / Anthropic / Gemini) directly — see ~/ai/CLAUDE.md.
#
# WHY A PROXY
#   - One place to swap models, add providers, and tune timeouts/retries.
#   - Centralized Langfuse tracing of every generation (see litellm_settings).
#   - Virtual-key budget tracking via a Postgres DB (see general_settings).
#   - Provider-agnostic "role" aliases (smart/worker/cheap/fast) so calling code
#     names an intent, not a vendor model, and stays portable across providers.
#
# KEY DESIGN DECISIONS
#   - Provider API keys are ALL optional. Each model entry references its key via
#     os.environ/<NAME>; if that env var is unset the entry returns an auth error
#     at call time and LiteLLM simply skips it. So you only need keys for the
#     providers you actually have — the role aliases degrade gracefully.
#   - Role aliases list EVERY supported provider in priority (preference) order.
#     LiteLLM round-robins within an alias group and skips auth-failing entries,
#     so the first provider whose key is present effectively "wins".
#   - Two layers of resilience: (1) within a model group, LiteLLM retries across
#     entries on auth/rate errors; (2) the litellm_settings.fallbacks map kicks
#     in only when EVERY entry in a group fails, routing to a different group.
#
# ENV VARS CONSUMED (resolved at proxy startup from ai-router/.env)
#   LITELLM_MASTER_KEY     — admin/auth key for the proxy itself (required)
#   LITELLM_DATABASE_URL   — Postgres URL for virtual-key budget tracking
#   OPENAI_API_KEY         — enables gpt-4o / gpt-4o-mini / o1-mini / embeddings
#   ANTHROPIC_API_KEY      — enables claude-* models
#   GEMINI_API_KEY         — enables gemini-* models
#   LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY / LANGFUSE_HOST — tracing sink
#
# Provider keys are ALL optional — only define the ones you have.
# Role aliases (smart / worker / cheap / fast) each list every supported
# provider in priority order; LiteLLM tries them round-robin and falls back
# automatically when a key is missing or a call fails.
# =============================================================================

# Proxy-wide auth and persistence settings.
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY   # admin key; also the default bearer token clients present
  # YAML model_list below is the bootstrap base; Hyperion layers operator-defined aliases
  # on top at runtime via the admin API (/model/new), persisted in the Postgres `litellm`
  # DB. Enabling this is what makes UI-defined aliases (models_registry) actually route —
  # see agents/hyperion/src/hyperion/tools/litellm_admin.py. Additive: YAML models still load.
  store_model_in_db: true
  # DATABASE_URL is injected via env for virtual key budget tracking (Phase 0.2)
  database_url: os.environ/LITELLM_DATABASE_URL

# Global behavior applied to every request regardless of model.
litellm_settings:
  drop_params: true        # silently drop params a target provider doesn't support (keeps cross-provider calls portable)
  modify_params: true      # auto-massage messages into Anthropic-compatible form. CrewAI's tool loop can end a
                           # conversation on an assistant turn (prefill); newer Claude models reject that
                           # ("conversation must end with a user message"). This makes litellm fix it instead of failing.
  set_verbose: false       # keep proxy logs quiet; flip to true only for local debugging
  request_timeout: 120     # seconds per upstream call before LiteLLM aborts it
  num_retries: 2           # retries per entry on transient/rate errors before moving on
  # Langfuse tracing — every LLM call is logged as a generation, grouped by
  # session_id metadata (set by the calling agent — Hyperion sets it to task_id).
  # Keys + host are read from env: LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY / LANGFUSE_HOST
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  # Cross-model fallbacks: when ALL entries in a model group fail, try these.
  # Within a group, LiteLLM already retries across entries on auth/rate errors.
  # Each list is tried left-to-right; note these chains can hop between role
  # aliases and concrete model names (e.g. smart -> worker -> gpt-4o).
  # CHEAP-CLAUDE MODE: all role aliases route to the cheapest Claude (Haiku). The
  # Gemini free tier on this key is too rate-limited (~20 req/day) for iterative runs,
  # so for "is the workflow firing end to end?" testing we use Haiku — cheap, fast, and
  # high enough rate limits to complete a full prover run. Flip the alias blocks below
  # back to gemini/* to return to free-tier mode.
  fallbacks:
    - smart:            ["worker", "gpt-4o-mini"]
    - worker:           ["gpt-4o-mini"]
    - cheap:            ["fast", "claude-sonnet-4-6"]
    - fast:             ["claude-sonnet-4-6"]

# Concrete model definitions plus role-alias groups.
# model_name is the public handle clients request; litellm_params.model is the
# provider-prefixed upstream id LiteLLM actually calls. Multiple entries sharing
# one model_name form a "group" that LiteLLM load-balances / fails over across.
model_list:

  # ── OpenAI ────────────────────────────────────────────────────────────────
  # Requires OPENAI_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: o1-mini
    litellm_params:
      model: openai/o1-mini
      api_key: os.environ/OPENAI_API_KEY

  # ── Anthropic Claude ──────────────────────────────────────────────────────
  # Requires ANTHROPIC_API_KEY (console.anthropic.com — pay-per-use)
  # Omit ANTHROPIC_API_KEY and these models will be skipped by the aliases below.

  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Google Gemini ─────────────────────────────────────────────────────────
  # Requires GEMINI_API_KEY (aistudio.google.com)

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.5-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  # ── Embeddings ────────────────────────────────────────────────────────────
  # text-embedding-3-small is used for Qdrant RAG (requires OPENAI_API_KEY)

  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

  # ── Role aliases ──────────────────────────────────────────────────────────
  # Each alias is a multi-provider group. LiteLLM picks entries round-robin
  # and skips ones that return auth errors, so only providers with valid keys
  # are actually used. Add your preferred provider first.
  #
  # To change which model is used for a role, set the env var in
  # agents/hyperion/.env (MODEL_PLANNER, MODEL_WORKER, MODEL_CHEAP).

  # CHEAP-CLAUDE MODE (see fallbacks note above): every role alias resolves to the
  # cheapest Claude (Haiku) so a full prover run completes reliably for workflow-firing
  # tests. To return to free-tier mode, repoint these four blocks back to gemini/*.

  # smart / worker — the two CrewAI AGENT stages (decompose, synthesize). CrewAI's
  # ReAct loop ends each turn on an assistant message (prefill); the newer Claude models
  # (sonnet-4-6 / haiku-4-5 / opus-4-8) reject that outright ("This model does not support
  # assistant message prefill"), and litellm's modify_params does NOT strip it (a trailing
  # assistant message is a legal request it won't rewrite). So the CrewAI stages run on
  # gpt-4o-mini (prefill-safe, cheap); Claude is kept for every NON-CrewAI call below,
  # which uses a plain client with no prefill. To move these onto Claude, the proxy needs
  # a pre-call hook that drops the trailing assistant message for anthropic/* models.
  - model_name: smart
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: worker
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # cheap — Sonnet. Tool sub-calls (repair/abstract proposals) + meta (title/tags). Kept
  # on Sonnet rather than Haiku: Haiku skipped the plan-writing tool entirely in testing,
  # so for reliable workflow runs we default the small calls to Sonnet too.
  - model_name: cheap
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # fast — Sonnet (cheapest/fastest iteration that still follows tool protocols reliably).
  - model_name: fast
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

# Router-level controls for how entries within a model group are selected/retried.
router_settings:
  routing_strategy: simple-shuffle  # pick a random healthy entry per request (cheap stateless load-balancing across providers)
  num_retries: 2                    # router-level retries across group entries (complements litellm_settings.num_retries)
  timeout: 120                      # seconds the router waits on a chosen entry before failing it over
  retry_after: 5                    # seconds to back off before retrying a failed entry
