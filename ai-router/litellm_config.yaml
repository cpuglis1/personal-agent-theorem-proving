# =============================================================================
# LiteLLM Proxy Configuration
# Docs: https://docs.litellm.ai/docs/proxy/configs
# =============================================================================

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: false

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 120
  num_retries: 2
  fallbacks:
    - "gpt-4o": ["claude-sonnet-4-6", "gemini-1.5-pro"]
    - "claude-sonnet-4-6": ["gpt-4o", "gemini-1.5-pro"]
    - "gemini-1.5-pro": ["gpt-4o", "claude-sonnet-4-6"]

model_list:

  # ── OpenAI ──────────────────────────────────────────────────────────────────

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: o1-mini
    litellm_params:
      model: openai/o1-mini
      api_key: os.environ/OPENAI_API_KEY

  # ── Anthropic Claude ────────────────────────────────────────────────────────
  # Requires ANTHROPIC_API_KEY (pay-as-you-go; separate from your subscription)

  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Google Gemini ────────────────────────────────────────────────────────────

  - model_name: gemini-1.5-pro
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-1.5-flash
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY

  # ── Routing aliases ──────────────────────────────────────────────────────────

  - model_name: smart          # best reasoning model available
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: fast           # cheapest/fastest for iteration
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120
  retry_after: 5
